<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LastZ Masteries Simulator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="topbar">

        <div class="title">
            LastZ Masteries Simulator
        </div>

        <div class="points">

            <label for="primaryTree">
                Selected specialization:
            </label>
        
            <select id="primaryTree">
                <option value="">-- Select --</option>
                <option value="support">Support</option>
                <option value="combat">Combat</option>
            </select>
        
            <span class="separator">|</span>
        
            <label for="availablePoints">
                Current level:
            </label>
        
            <input
                id="availablePoints"
                type="number"
                min="0"
                max="999"
                value="60">
        
            <span class="separator">|</span>
        
            <span>Spent:</span>
            <span id="spentPoints">0</span>
        
            <span class="separator">|</span>
        
            <span>Remaining:</span>
            <span id="remainingPoints">60</span>
        
            <span class="separator">|</span>
        
            <span>Secondary:</span>
            <span id="secondaryUnlockedPoints">0</span>
        
        </div>

        <div class="buttons">

            <button id="resetButton">
                Reset
            </button>

        </div>

    </header>


    <main class="treesWrapper">

        <section class="treePanel" data-tree-panel="support">
            <h2>Support</h2>
            <div id="supportTree" class="talentTree"></div>
        </section>
        
        <section class="treePanel" data-tree-panel="combat">
            <h2>Combat</h2>
            <div id="combatTree" class="talentTree"></div>
        </section>
    
    </main>


    <!-- ========================================================= -->
    <!-- Tooltip -->
    <!-- ========================================================= -->

    <div id="tooltip" class="tooltip hidden">

        <div class="tooltip-title"></div>

        <div class="tooltip-description"></div>

    </div>


    <!-- ========================================================= -->
    <!-- Template de um Tier -->
    <!-- ========================================================= -->

    <template id="tierTemplate">

        <section class="tier">

            <div class="tierLevel">
                Lv.1
            </div>

            <div class="tierTalents">

            </div>

        </section>

    </template>


    <!-- ========================================================= -->
    <!-- Template de um Talento -->
    <!-- ========================================================= -->

    <template id="talentTemplate">

        <div class="talent">

            <img class="talentIcon">
        
            <div class="upgradeArrow"></div>
        
            <div class="talentPoints"></div>
        
        </div>

    </template>


    <!-- ========================================================= -->
    <!-- Scripts -->
    <!-- ========================================================= -->

    <script src="talents.js"></script>
    <script src="app.js"></script>

</body>

</html>
